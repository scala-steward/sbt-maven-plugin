name: Check

on:
  pull_request:

  push:
    branches:
      - main # Check branch after merge

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-code-style:
    name: Code Style # scalafmt, javafmt, headerCheck
    uses: playframework/.github/.github/workflows/cmd.yml@v4
    with:
      cmd: sbt validateCode

  tests:
    name: Tests
    uses: playframework/.github/.github/workflows/cmd.yml@v4
    with:
      java: 25, 21, 17, 11
      scala: 2.12.x, 3.x
      add-dimensions: >-
        {
          "sbt": [ "1.12.11", "2.0.0-RC12" ]
        }
      exclude: >-
        [
          {"scala": "2.12.x", "sbt": "2.0.0-RC12"},
          {"scala": "3.x", "sbt": "1.12.11"},
          {"java": "11", "scala": "3.x"}
        ]
      cmd: >-
        sbt "
          ++$MATRIX_SCALA Test/compile;
          set scriptedSbt := \"$MATRIX_SBT\";
          set scriptedLaunchOpts += \"-Dscala.version=$MATRIX_SCALA\";
          show scriptedSbt;
          show scriptedLaunchOpts;
          scripted;
        "  

  finish:
    name: Finish
    if: github.event_name == 'pull_request'
    needs: # Should be last
      - "tests"
    uses: playframework/.github/.github/workflows/rtm.yml@v4
